education:
    title: Education
    info:
      - degree: Dr.-Ing. (equiv. Ph.D)
        university: Technische Universität Chemnitz
        time: 2018 - Present
        details: |
          The focus of my research is deep learning based person detection, human pose estimation and human activity recognition for top-view fisheye cameras. In addition to algorithm development, an important aspect of the topic is data generation, especially synthetic data generation using game engine (Unity) and NeRF.

      - degree: Dipl.-Ing. (equiv. M.Sc.) in Electrical Engineering
        university: Technische Universität Dresden
        time: 2010 - 2016
        details: |
            - Course of study: Biomedical Engineering
            - Master thesis: Evaluation of Algorithms for Optical Variation Detection in Intraoperative Optical Imaging

experiences:
    title: Experiences
